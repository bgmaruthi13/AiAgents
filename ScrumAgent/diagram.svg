<svg viewBox="0 0 900 780" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="780" fill="#f8f9fa" rx="12"/>
  <text x="450" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0D2B5E">Azure DevOps + VS Code Copilot Agent Automation</text>
  <text x="450" y="46" text-anchor="middle" font-size="11" fill="#5B7FA6">End-to-end Scrum automation · Sprint Planning generates SDLC tasks · Sprint close generates Release Notes</text>
  <text x="100" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#5B7FA6" letter-spacing="0.5">SCRUM STAGE</text>
  <text x="390" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#5B7FA6" letter-spacing="0.5">AI AGENT</text>
  <text x="720" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#5B7FA6" letter-spacing="0.5">ADO / OUTPUT ACTION</text>
  <line x1="20" y1="74" x2="880" y2="74" stroke="#DBEAFE" stroke-width="1"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5B7FA6"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1565C0"/></marker>
  </defs>

  <!-- ROW 1: Backlog Refinement -->
  <rect x="20" y="82" width="160" height="52" rx="7" fill="#E3F0FF" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="100" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2B5E">Backlog Refinement</text>
  <text x="100" y="123" text-anchor="middle" font-size="9" fill="#1565C0">Prepare &amp; clarify items</text>
  <line x1="180" y1="108" x2="213" y2="108" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="213" y="82" width="330" height="52" rx="7" fill="#FFF8E1" stroke="#F0A500" stroke-width="1.5"/>
  <text x="378" y="103" text-anchor="middle" font-size="11" font-weight="700" fill="#7A5500">BacklogRefinerAgent</text>
  <text x="378" y="121" text-anchor="middle" font-size="10" fill="#8B6500">Reads items — rewrites descriptions + suggests ACs</text>
  <line x1="543" y1="108" x2="576" y2="108" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="82" width="304" height="52" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="728" y="103" text-anchor="middle" font-size="10" fill="#1B5E20">PATCH /workitems</text>
  <text x="728" y="121" text-anchor="middle" font-size="10" fill="#1B5E20">Update description + AC field</text>

  <!-- ROW 2: Poker Planning -->
  <rect x="20" y="146" width="160" height="52" rx="7" fill="#E3F0FF" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="100" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2B5E">Poker Planning</text>
  <text x="100" y="186" text-anchor="middle" font-size="9" fill="#1565C0">Estimate story points</text>
  <line x1="180" y1="172" x2="213" y2="172" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="213" y="146" width="330" height="52" rx="7" fill="#FFF8E1" stroke="#F0A500" stroke-width="1.5"/>
  <text x="378" y="167" text-anchor="middle" font-size="11" font-weight="700" fill="#7A5500">EstimationAgent</text>
  <text x="378" y="185" text-anchor="middle" font-size="10" fill="#8B6500">Analyses complexity — suggests points, flags risk</text>
  <line x1="543" y1="172" x2="576" y2="172" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="146" width="304" height="52" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="728" y="167" text-anchor="middle" font-size="10" fill="#1B5E20">PATCH /workitems</text>
  <text x="728" y="185" text-anchor="middle" font-size="10" fill="#1B5E20">Story Points + Risk tag</text>

