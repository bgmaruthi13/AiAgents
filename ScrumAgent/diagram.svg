  <text x="100" y="694" text-anchor="middle" font-size="11" font-weight="700" fill="#4A0080">Generator</text>
  <text x="100" y="712" text-anchor="middle" font-size="9" fill="#7B1FA2">Triggered at sprint close</text>
  <text x="100" y="728" text-anchor="middle" font-size="9" fill="#7B1FA2">or on-demand</text>
  <line x1="180" y1="695" x2="213" y2="695" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="213" y="650" width="330" height="90" rx="7" fill="#F9F0FF" stroke="#7B1FA2" stroke-width="2"/>
  <text x="378" y="670" text-anchor="middle" font-size="11" font-weight="700" fill="#4A0080">ReleaseNotesAgent</text>
  <rect x="221" y="677" width="148" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="295" y="690" text-anchor="middle" font-size="9" fill="#4A0080">① Reads all Done stories</text>
  <rect x="375" y="677" width="160" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="455" y="690" text-anchor="middle" font-size="9" fill="#4A0080">② Reads linked PRs &amp; commits</text>
  <rect x="221" y="701" width="148" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
