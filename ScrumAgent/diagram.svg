  <text x="100" y="368" text-anchor="middle" font-size="9" fill="#1565C0">Scope + SDLC tasks</text>

  <rect x="213" y="210" width="330" height="300" rx="7" fill="#FFFBF0" stroke="#F0A500" stroke-width="2"/>
  <text x="378" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#7A5500">SprintPlannerAgent</text>
  <rect x="223" y="237" width="310" height="36" rx="5" fill="#FFF3CC" stroke="#F0C040" stroke-width="1"/>
  <text x="378" y="251" text-anchor="middle" font-size="10" font-weight="600" fill="#7A5500">① Read User Story</text>
  <text x="378" y="265" text-anchor="middle" font-size="9" fill="#8B6500">Title · Description · Acceptance Criteria · Story Points</text>
  <line x1="378" y1="273" x2="378" y2="283" stroke="#F0A500" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <rect x="223" y="283" width="310" height="36" rx="5" fill="#FFF3CC" stroke="#F0C040" stroke-width="1"/>
  <text x="378" y="297" text-anchor="middle" font-size="10" font-weight="600" fill="#7A5500">② AI Synthesises Story</text>
  <text x="378" y="311" text-anchor="middle" font-size="9" fill="#8B6500">Understands scope, complexity &amp; ACs via GPT-4o</text>
  <line x1="378" y1="319" x2="378" y2="329" stroke="#F0A500" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <rect x="223" y="329" width="310" height="162" rx="5" fill="#FFF3CC" stroke="#F0C040" stroke-width="1"/>
  <text x="378" y="345" text-anchor="middle" font-size="10" font-weight="600" fill="#7A5500">③ Generates SDLC Child Tasks</text>
  <rect x="231" y="352" width="130" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="296" y="366" text-anchor="middle" font-size="9" fill="#0D2B5E">📐 Design</text>
  <rect x="371" y="352" width="152" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="447" y="366" text-anchor="middle" font-size="9" fill="#0D2B5E">🔧 Backend Dev</text>
  <rect x="231" y="378" width="130" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="296" y="392" text-anchor="middle" font-size="9" fill="#0D2B5E">🖥️ Frontend Dev</text>
  <rect x="371" y="378" width="152" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="447" y="392" text-anchor="middle" font-size="9" fill="#0D2B5E">✅ Unit Testing</text>
  <rect x="231" y="404" width="130" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="296" y="418" text-anchor="middle" font-size="9" fill="#0D2B5E">🔍 QA / Integration</text>
  <rect x="371" y="404" width="152" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="447" y="418" text-anchor="middle" font-size="9" fill="#0D2B5E">📄 Documentation</text>
  <rect x="231" y="430" width="130" height="20" rx="4" fill="#DBEAFE" stroke="#1565C0" stroke-width="1"/>
  <text x="296" y="444" text-anchor="middle" font-size="9" fill="#0D2B5E">🚀 Deployment</text>
  <text x="378" y="478" text-anchor="middle" font-size="9" fill="#8B6500">Each task inherits AC context from parent story</text>

  <line x1="543" y1="360" x2="576" y2="360" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="210" width="304" height="300" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="728" y="232" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">ADO REST API</text>
  <rect x="586" y="240" width="284" height="34" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="255" text-anchor="middle" font-size="9" fill="#1B5E20">POST /iterations — assign items to sprint</text>
  <text x="728" y="268" text-anchor="middle" font-size="9" fill="#1B5E20">set iteration path per team capacity</text>
  <rect x="586" y="280" width="284" height="34" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="295" text-anchor="middle" font-size="9" fill="#1B5E20">POST /workitems?type=Task</text>
  <text x="728" y="308" text-anchor="middle" font-size="9" fill="#1B5E20">Create child task per SDLC phase</text>
  <rect x="586" y="320" width="284" height="34" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="335" text-anchor="middle" font-size="9" fill="#1B5E20">PATCH /workitems — link child→parent</text>
  <text x="728" y="348" text-anchor="middle" font-size="9" fill="#1B5E20">Hierarchy-Forward relationship</text>
  <rect x="586" y="360" width="284" height="34" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="375" text-anchor="middle" font-size="9" fill="#1B5E20">PATCH /workitems — populate each task</text>
  <text x="728" y="388" text-anchor="middle" font-size="9" fill="#1B5E20">Title, Description, Hours from AC synthesis</text>
  <rect x="586" y="400" width="284" height="34" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="415" text-anchor="middle" font-size="9" fill="#1B5E20">PATCH /workitems — assign to iteration</text>
  <text x="728" y="428" text-anchor="middle" font-size="9" fill="#1B5E20">Tasks inherit parent sprint path</text>
  <rect x="586" y="440" width="284" height="52" rx="4" fill="#C8E6C9" stroke="#43A047" stroke-width="1"/>
  <text x="728" y="455" text-anchor="middle" font-size="9" fill="#1B5E20">PATCH /workitems — set estimated hours</text>
  <text x="728" y="468" text-anchor="middle" font-size="9" fill="#1B5E20">Remaining Work field per task phase</text>
  <text x="728" y="481" text-anchor="middle" font-size="9" fill="#1B5E20">auto-assigned to team member by skill</text>

  <!-- ROW 4: Daily Scrum -->
  <rect x="20" y="522" width="160" height="52" rx="7" fill="#E3F0FF" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="100" y="543" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2B5E">Daily Scrum</text>
  <text x="100" y="562" text-anchor="middle" font-size="9" fill="#1565C0">Track &amp; resolve blockers</text>
  <line x1="180" y1="548" x2="213" y2="548" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="213" y="522" width="330" height="52" rx="7" fill="#FFF8E1" stroke="#F0A500" stroke-width="1.5"/>
  <text x="378" y="543" text-anchor="middle" font-size="11" font-weight="700" fill="#7A5500">DailyScrumAgent</text>
  <text x="378" y="561" text-anchor="middle" font-size="10" fill="#8B6500">Polls blocked tasks — generates standup summary</text>
  <line x1="543" y1="548" x2="576" y2="548" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="522" width="304" height="52" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="728" y="543" text-anchor="middle" font-size="10" fill="#1B5E20">GET /wiql · Teams webhook</text>
  <text x="728" y="561" text-anchor="middle" font-size="10" fill="#1B5E20">PATCH state on resolved blockers</text>

  <!-- ROW 5: Retrospective -->
  <rect x="20" y="586" width="160" height="52" rx="7" fill="#E3F0FF" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="100" y="607" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2B5E">Retrospective</text>
  <text x="100" y="626" text-anchor="middle" font-size="9" fill="#1565C0">Improve next cycle</text>
  <line x1="180" y1="612" x2="213" y2="612" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="213" y="586" width="330" height="52" rx="7" fill="#FFF8E1" stroke="#F0A500" stroke-width="1.5"/>
  <text x="378" y="607" text-anchor="middle" font-size="11" font-weight="700" fill="#7A5500">RetroAgent</text>
  <text x="378" y="625" text-anchor="middle" font-size="10" fill="#8B6500">Analyses velocity — drafts report, creates next items</text>
  <line x1="543" y1="612" x2="576" y2="612" stroke="#5B7FA6" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="586" width="304" height="52" rx="7" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="728" y="607" text-anchor="middle" font-size="10" fill="#1B5E20">GET /reports · POST work items</text>
  <text x="728" y="625" text-anchor="middle" font-size="10" fill="#1B5E20">to backlog for next sprint</text>

  <!-- ROW 6: Release Notes -->
