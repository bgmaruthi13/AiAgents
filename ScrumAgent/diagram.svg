  <rect x="375" y="701" width="160" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="455" y="714" text-anchor="middle" font-size="9" fill="#4A0080">④ GPT-4o drafts narrative</text>
  <text x="378" y="733" text-anchor="middle" font-size="9" fill="#5A189A">Bug fixes · New Features · Improvements · Breaking Changes</text>
  <line x1="543" y1="695" x2="576" y2="695" stroke="#7B1FA2" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="576" y="650" width="304" height="90" rx="7" fill="#F3E8FF" stroke="#7B1FA2" stroke-width="2"/>
  <text x="728" y="670" text-anchor="middle" font-size="11" font-weight="700" fill="#4A0080">Output</text>
  <rect x="586" y="677" width="284" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="728" y="690" text-anchor="middle" font-size="9" fill="#4A0080">POST /wiki/pages — publish to ADO Wiki</text>
  <rect x="586" y="701" width="284" height="18" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="728" y="714" text-anchor="middle" font-size="9" fill="#4A0080">Teams message to stakeholders channel</text>
  <rect x="586" y="725" width="284" height="12" rx="3" fill="#EDD9FF" stroke="#7B1FA2" stroke-width="1"/>
  <text x="728" y="735" text-anchor="middle" font-size="9" fill="#4A0080">Optional: export as .docx / email</text>

  <!-- Footer -->
  <rect x="20" y="748" width="860" height="26" rx="6" fill="#E3F0FF"/>
  <text x="450" y="762" text-anchor="middle" font-size="9.5" font-weight="600" fill="#0D2B5E">Tech Stack</text>
  <text x="450" y="770" text-anchor="middle" font-size="9" fill="#5B7FA6">VS Code Copilot Extension API · Azure DevOps REST API (PAT auth) · Azure OpenAI GPT-4o · ADO Wiki API · Microsoft Teams Webhook</text>
