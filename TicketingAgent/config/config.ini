[postgresql]
host     = localhost
port     = 5432
database = your_database
user     = your_user
password = your_password

[query]
# Your custom SQL to fetch ETL errors.
# Must return columns: error_id, pipeline_name, error_message, error_time
# Add any WHERE filters you need (date range, severity, source system, etc.)
fetch_errors =
    SELECT
        id            AS error_id,
        pipeline_name AS pipeline_name,
        error_message AS error_message,
        error_time    AS error_time,
        source_table  AS source_table
    FROM etl_error_logs
    WHERE status = 'FAILED'
      AND error_time >= NOW() - INTERVAL '24 hours'
    ORDER BY error_time DESC

[tracking]
# We create this table automatically — no manual setup needed
# Uses same PostgreSQL connection above
schema = public
table  = etl_jira_tracking

[jira]
url          = http://your-jira-server.com
project_key  = ETL
issue_type   = Bug
username     = your_jira_username
password     = your_jira_password_or_token

[priority]
# Keywords in error_message that map to Jira priority levels
# Comma-separated, case-insensitive
critical = period not open, ledger locked, authentication failed, database down, connection refused
high     = timeout, interface failed, gl interface, currency revaluation, intercompany
medium   = report failed, extract error, transform error, file not found
low      = archive, audit log, warning

[companion]
# Port used by VS Code extension to receive previews from MCP server
port = 3131
